<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Roadie Runner — Cartolina</title>
<style>
  @page { size: A6 portrait; margin: 0; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; }
  .card {
    width: 105mm; height: 148mm; margin: 0 auto;
    background: radial-gradient(120% 80% at 50% 18%, #1b1422 0%, #0a0a0f 100%);
    color: #e8e8e8; display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    padding: 11mm 8mm; text-align: center;
  }
  .title { display: flex; align-items: center; gap: 8px; }
  .chev { font-weight: 900; font-size: 30px; line-height: 1; }
  .chev .g { color: #ffcf3f; } .chev .m { color: #ff3860; }
  h1 { margin: 0; font-size: 26px; letter-spacing: 2px; color: #ff3860; }
  .sub { margin: 5px 0 0; font-size: 12px; color: #f5b301; letter-spacing: 5px; }
  .qr { background: #fff; padding: 6mm; border-radius: 12px; }
  .qr img { width: 54mm; height: 54mm; display: block; }
  .cta { font-size: 17px; font-weight: 700; margin: 0; }
  .cta small { display: block; font-weight: 400; font-size: 12px; color: #b8b8c0; margin-top: 4px; }
  .brand { font-size: 11px; letter-spacing: 5px; color: #7a7a86; margin: 0; }
  @media screen { body { background: #333; padding: 20px; } }
</style>
</head>
<body>
  <div class="card">
    <div>
      <div class="title"><span class="chev"><span class="g">&raquo;</span><span class="m">&raquo;</span></span></div>
      <h1>ROADIE RUNNER</h1>
      <p class="sub">B L E A R R E D</p>
    </div>
    <div class="qr"><img src="qr.png" alt="QR per giocare a Roadie Runner"></div>
    <div>
      <p class="cta">Inquadra e gioca<small>Corri sul palco, salta gli ostacoli del backstage. Batti il record!</small></p>
    </div>
    <p class="brand">game &middot; blearred</p>
  </div>
</body>
</html>
