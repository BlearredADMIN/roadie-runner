<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Roadie Runner">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="manifest" href="manifest.json">
<title>Roadie Runner</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: #0a0a0f;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
    position: fixed;
    top: 0; left: 0;
  }
  #wrap {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: env(safe-area-inset-top) 8px env(safe-area-inset-bottom);
  }
  h1 {
    margin: 0;
    font-size: 16px;
    letter-spacing: 3px;
    color: #ff3860;
    text-transform: uppercase;
    text-align: center;
  }
  #info {
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
    text-align: center;
  }
  canvas {
    background: linear-gradient(to bottom, #1a1a2a 0%, #0a0a0f 70%, #1a1018 100%);
    border: 1px solid #222;
    box-shadow: 0 0 40px rgba(255, 56, 96, 0.15);
    image-rendering: pixelated;
    max-width: 100%;
    max-height: calc(100dvh - 80px);
    width: auto;
    height: auto;
    display: block;
  }
  #lb-open {
    margin-top: 2px;
    background: #1a1a1a;
    color: #ff3860;
    border: 1px solid #ff3860;
    border-radius: 6px;
    font: bold 12px monospace;
    letter-spacing: 1px;
    padding: 6px 14px;
    cursor: pointer;
  }
  #lb {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.82);
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
  }
  #lb[hidden] { display: none; }
  .lb-box {
    background: #12121a;
    border: 1px solid #ff3860;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,56,96,0.25);
    width: 100%; max-width: 340px;
    padding: 18px 16px;
    text-align: center;
  }
  .lb-box h2 {
    margin: 0 0 12px;
    color: #ff3860;
    font: bold 18px monospace;
    letter-spacing: 3px;
  }
  /* Punteggio finale, molto grande e centrale */
  #lb-score { margin-bottom: 10px; }
  #lb-score[hidden] { display: none; }
  #lb-score .lbl {
    display: block; color: #9aa; font: 11px monospace;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px;
  }
  #lb-score b {
    display: block; color: #ffe060; font: bold 46px monospace;
    line-height: 1; text-shadow: 0 0 18px rgba(255,224,96,0.4);
  }
  /* Messaggio "Nuovo High Score!" */
  #lb-title {
    color: #ff3860; font: bold 15px monospace; letter-spacing: 1px;
    margin-bottom: 12px; animation: pop 0.4s ease;
  }
  #lb-title[hidden] { display: none; }
  @keyframes pop { 0% { transform: scale(0.7); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .lb-side { margin-bottom: 4px; }
  #lb-list {
    list-style: none; margin: 0 0 12px; padding: 0;
    font: 13px monospace; color: #e8e8e8; text-align: left;
  }
  #lb-list li {
    display: flex; align-items: center;
    padding: 4px 6px; border-bottom: 1px solid #222;
  }
  #lb-list li.me { background: rgba(255,56,96,0.18); border-radius: 4px; }
  #lb-list li.flash { animation: flashRow 1.4s ease; }
  @keyframes flashRow {
    0%, 100% { background: rgba(255,56,96,0.18); }
    25% { background: rgba(255,224,96,0.85); }
    60% { background: rgba(255,224,96,0.35); }
  }
  #lb-list li .rank { color: #ffd24a; width: 26px; }
  #lb-list li .nm { flex: 1; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #lb-list li .sc { color: #aaa; }
  #lb-msg { color: #888; font: 12px monospace; margin: 8px 0; }
  #lb-entry { display: flex; gap: 6px; margin-bottom: 10px; }
  #lb-entry[hidden] { display: none; }
  #lb-name {
    flex: 1; min-width: 0;
    background: #0a0a0f; color: #e8e8e8;
    border: 1px solid #333; border-radius: 6px;
    font: 14px monospace; padding: 8px;
  }
  #lb-name:focus { outline: none; border-color: #ff3860; }
  .lb-btn {
    background: #ff3860; color: #fff; border: 0; border-radius: 6px;
    font: bold 13px monospace; padding: 8px 12px; cursor: pointer;
  }
  .lb-btn:disabled { opacity: 0.5; }
  .lb-actions { display: flex; gap: 8px; justify-content: center; align-items: center; margin-top: 6px; }
  #lb-replay[hidden] { display: none; }
  #lb-close {
    background: transparent; color: #888; border: 0;
    font: 12px monospace; cursor: pointer; padding: 6px;
  }
  /* Su schermi larghi: punteggio a sinistra, Top 10 a destra */
  @media (min-width: 620px) {
    .lb-box { max-width: 560px; }
    #lb-grid { display: flex; gap: 22px; align-items: center; text-align: left; }
    #lb-grid > .lb-left { flex: 0 0 190px; }
    #lb-grid > .lb-side { flex: 1; margin-bottom: 0; }
  }
</style>
</head>
<body>
<div id="wrap">
  <h1>🎤 Roadie Runner 🔧</h1>
  <canvas id="game" width="400" height="700"></canvas>
  <div id="info">Tocca lo schermo per saltare</div>
  <button id="lb-open">🏆 Classifica</button>
</div>

<div id="lb" hidden>
  <div class="lb-box">
    <div id="lb-grid">
      <div class="lb-left">
        <div id="lb-score" hidden>
          <span class="lbl">Il tuo punteggio</span>
          <b id="lb-score-val">0</b>
        </div>
        <div id="lb-title" hidden></div>
      </div>
      <div class="lb-side">
        <h2>TOP 10</h2>
        <ol id="lb-list"></ol>
        <div id="lb-msg" hidden></div>
      </div>
    </div>
    <div id="lb-entry" hidden>
      <input id="lb-name" maxlength="12" placeholder="Il tuo nome" autocomplete="off" spellcheck="false">
      <button id="lb-save" class="lb-btn">Salva</button>
    </div>
    <div class="lb-actions">
      <button id="lb-replay" class="lb-btn" hidden>🔁 Rigioca</button>
      <button id="lb-close">Chiudi</button>
    </div>
  </div>
</div>

<script>
(() => {
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  const GROUND_Y = H - 90;

  const state = {
    started: false,
    over: false,
    speed: 5,
    score: 0,
    best: parseInt(localStorage.getItem('roadie_best') || '0', 10),
    t: 0,
  };

  const roadie = {
    x: 70, y: GROUND_Y, vy: 0, w: 28, h: 44,
    onGround: true, legPhase: 0, jumpsLeft: 2,
  };

  const GRAVITY = 0.7;
  const JUMP_V = -13;

  const obstacles = [];
  const passes = [];
  const particles = [];
  const stars = [];
  const ground = [];

  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * (GROUND_Y - 40),
      r: Math.random() * 1.5 + 0.3,
      hue: Math.random() * 360,
      flicker: Math.random() * Math.PI * 2,
    });
  }

  for (let i = 0; i < 40; i++) {
    ground.push({ x: i * 20, y: GROUND_Y + Math.random() * 6 });
  }

  function jump() {
    if (state.over) { reset(); state.started = true; return; }
    if (!state.started) { state.started = true; return; }
    if (roadie.jumpsLeft > 0) {
      const isDouble = !roadie.onGround;
      roadie.vy = isDouble ? JUMP_V * 0.85 : JUMP_V;
      roadie.onGround = false;
      roadie.jumpsLeft--;
      if (isDouble) {
        for (let i = 0; i < 10; i++) {
          particles.push({
            x: roadie.x + 14 + (Math.random() - 0.5) * 10,
            y: roadie.y - 4,
            vx: (Math.random() - 0.5) * 3,
            vy: Math.random() * 1.5 + 0.3,
            life: 22,
            col: 'rgba(255, 200, 100, 0.8)',
            r: 1.5,
          });
        }
      }
    }
  }

  function handleInput(e) {
    if (document.body.classList.contains('ui-open')) return;
    if (e && e.cancelable) e.preventDefault();
    jump();
  }

  // unified input: use pointerdown when available (iOS 13+, all modern browsers)
  // otherwise fall back to touchstart + mousedown. Never both: on iOS the same
  // tap fires pointerdown AND touchstart, consuming two jumpsLeft at once and
  // killing the double-jump.
  let lastInputT = 0;
  function handleInputDeduped(e) {
    const now = performance.now();
    if (now - lastInputT < 50) return;
    lastInputT = now;
    handleInput(e);
  }
  if (window.PointerEvent) {
    document.addEventListener('pointerdown', handleInputDeduped);
  } else {
    document.addEventListener('touchstart', handleInputDeduped, { passive: false });
    document.addEventListener('mousedown', handleInputDeduped);
  }

  // keyboard fallback (desktop)
  document.addEventListener('keydown', (e) => {
    if (document.body.classList.contains('ui-open')) return;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') {
      e.preventDefault(); jump();
    }
    if (e.code === 'KeyR') reset();
  });

  // Il pulsante "Rigioca" della classifica fa ripartire subito la partita.
  document.addEventListener('roadie:restart', () => { reset(); state.started = true; });

  // block iOS pinch-zoom only (do NOT block touchmove globally — it kills taps)
  document.addEventListener('gesturestart', (e) => e.preventDefault());

  function makeObstacle(type, x) {
    const ob = { type, x, hit: false };
    if (type === 'speaker') { ob.w = 26; ob.h = 46; ob.y = GROUND_Y - ob.h; }
    else if (type === 'flame') { ob.w = 22; ob.h = 36; ob.y = GROUND_Y - ob.h; ob.phase = 0; }
    else if (type === 'co2') { ob.w = 18; ob.h = 50; ob.y = GROUND_Y - ob.h; ob.phase = Math.random() * 6; }
    else if (type === 'flightcase_l') { ob.w = 52; ob.h = 56; ob.y = GROUND_Y - ob.h; }
    else if (type === 'transenna') { ob.w = 42; ob.h = 20; ob.y = GROUND_Y - ob.h; }
    else if (type === 'testa_mobile') { ob.w = 24; ob.h = 46; ob.y = GROUND_Y - ob.h; ob.phase = Math.random() * 6; }
    else if (type === 'batterista') { ob.w = 42; ob.h = 46; ob.y = GROUND_Y - ob.h; ob.phase = 0; }
    else if (type === 'trabattello') { ob.w = 34; ob.h = 58; ob.y = GROUND_Y - ob.h; }
    else if (type === 'strobo') { ob.w = 34; ob.h = 20; ob.y = GROUND_Y - 92; ob.phase = Math.random() * 6; }
    else if (type === 'singer') { ob.w = 28; ob.h = 64; ob.y = GROUND_Y - ob.h; ob.phase = 0; }
    return ob;
  }

  function pickObstacleType() {
    const r = Math.random();
    const s = state.score;
    if (s < 100) {
      // Tier 1: cassa, CO2, strobo, testa mobile (protagonista), transenna
      if (r < 0.18) return 'speaker';
      if (r < 0.34) return 'co2';
      if (r < 0.50) return 'strobo';
      if (r < 0.82) return 'testa_mobile';
      return 'transenna';
    }
    if (s < 250) {
      // Tier 2: + flightcase BLEARRED, fiamma, batterista
      if (r < 0.24) return 'testa_mobile';
      if (r < 0.36) return 'transenna';
      if (r < 0.47) return 'speaker';
      if (r < 0.57) return 'co2';
      if (r < 0.67) return 'strobo';
      if (r < 0.79) return 'flightcase_l';
      if (r < 0.90) return 'flame';
      return 'batterista';
    }
    if (s < 450) {
      // Tier 3: + trabattello
      if (r < 0.22) return 'testa_mobile';
      if (r < 0.32) return 'transenna';
      if (r < 0.42) return 'speaker';
      if (r < 0.51) return 'co2';
      if (r < 0.60) return 'strobo';
      if (r < 0.71) return 'flightcase_l';
      if (r < 0.81) return 'flame';
      if (r < 0.91) return 'batterista';
      return 'trabattello';
    }
    // Tier 4: + cantante
    if (r < 0.20) return 'testa_mobile';
    if (r < 0.29) return 'transenna';
    if (r < 0.38) return 'speaker';
    if (r < 0.46) return 'co2';
    if (r < 0.54) return 'strobo';
    if (r < 0.64) return 'flightcase_l';
    if (r < 0.73) return 'flame';
    if (r < 0.82) return 'batterista';
    if (r < 0.91) return 'trabattello';
    return 'singer';
  }

  function spawnObstacle() {
    const ob = makeObstacle(pickObstacleType(), W + 20);
    obstacles.push(ob);
    return ob;
  }

  function spawnPass() {
    const high = Math.random() < 0.5;        // metà alti (da saltare), metà bassi (di corsa)
    const w = 16, h = 22;
    // basso: dentro il corpo del roadie a terra; alto: verso l'apice del salto
    const y = high ? GROUND_Y - 130 : GROUND_Y - 40;
    passes.push({ x: W + 20, y, w, h, taken: false });
  }

  // Types safe to pair: ground obstacles that must be JUMPED over (no strobo —
  // you must stay grounded — and no singer/large flightcase to avoid impossible
  // combos). Distance is tuned so a single jump (~150 px reach at speed 5)
  // isn't enough — you need the double-jump.
  const PAIR_TYPES = ['speaker', 'flame', 'transenna', 'testa_mobile'];

  let nextSpawn = 70;
  let nextPass = 90;

  function reset() {
    state.over = false; state.speed = 5;
    state.score = 0; state.t = 0;
    obstacles.length = 0; particles.length = 0; passes.length = 0;
    roadie.y = GROUND_Y; roadie.vy = 0; roadie.onGround = true; roadie.jumpsLeft = 2;
    nextSpawn = 70; nextPass = 90;
  }

  function drawBackground() {
    // colored stars
    stars.forEach(s => {
      s.flicker += 0.05;
      const a = 0.4 + Math.sin(s.flicker) * 0.4;
      ctx.fillStyle = `hsla(${s.hue}, 80%, 65%, ${a})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // truss bar at top
    ctx.fillStyle = '#15151c';
    ctx.fillRect(0, 0, W, 22);
    ctx.strokeStyle = '#2a2a35';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 18) {
      ctx.beginPath();
      ctx.moveTo(i, 0); ctx.lineTo(i + 9, 22); ctx.lineTo(i + 18, 0);
      ctx.stroke();
    }

    // hanging fixtures with light cones (decorative only — not obstacles)
    for (let i = 30; i < W + 30; i += 80) {
      ctx.fillStyle = '#2a2a35';
      ctx.fillRect(i - 5, 22, 10, 8);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(i - 6, 30, 12, 6);

      const hue = (state.t * 1.5 + i * 4) % 360;
      const beamLen = GROUND_Y - 36;
      const glow = ctx.createLinearGradient(i, 36, i, 36 + beamLen);
      glow.addColorStop(0, `hsla(${hue}, 90%, 60%, 0.35)`);
      glow.addColorStop(1, `hsla(${hue}, 90%, 60%, 0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.moveTo(i - 5, 36);
      ctx.lineTo(i - 50, GROUND_Y);
      ctx.lineTo(i + 50, GROUND_Y);
      ctx.lineTo(i + 5, 36);
      ctx.closePath();
      ctx.fill();

      // lens
      ctx.fillStyle = `hsl(${hue}, 90%, 65%)`;
      ctx.fillRect(i - 3, 34, 6, 3);
    }

    // stage backdrop strip
    const bdGrad = ctx.createLinearGradient(0, GROUND_Y - 120, 0, GROUND_Y);
    bdGrad.addColorStop(0, 'rgba(40, 10, 30, 0)');
    bdGrad.addColorStop(1, 'rgba(80, 20, 50, 0.4)');
    ctx.fillStyle = bdGrad;
    ctx.fillRect(0, GROUND_Y - 120, W, 120);
  }

  function drawGround() {
    ctx.strokeStyle = '#3a3a48';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y);
    ctx.stroke();

    // serpentine cable
    ctx.strokeStyle = '#1c1c24';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < W; i += 2) {
      const y = GROUND_Y + 8 + Math.sin((i + state.t * 4) * 0.05) * 2;
      if (i === 0) ctx.moveTo(i, y); else ctx.lineTo(i, y);
    }
    ctx.stroke();

    ground.forEach(g => {
      g.x -= state.speed;
      if (g.x < -10) g.x += 40 * 20;
      ctx.fillStyle = '#2a2a32';
      ctx.fillRect(g.x, g.y, 3, 2);
    });

    // stage floor below ground line
    ctx.fillStyle = '#0a0a10';
    ctx.fillRect(0, GROUND_Y + 14, W, H - GROUND_Y - 14);
  }

  function drawRoadie() {
    const x = roadie.x;
    const y = roadie.y;
    const h = roadie.h;

    ctx.save();
    ctx.translate(x, y - h);

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(roadie.w / 2, h + 2, 14, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    const legSwing = roadie.onGround ? Math.sin(roadie.legPhase) * 4 : 0;
    // pants / legs
    ctx.fillStyle = '#2d2d35';
    ctx.fillRect(7, 30, 5, 14 + (roadie.onGround ? 0 : -2));
    ctx.fillRect(16, 30, 5, 14 + (roadie.onGround ? 0 : -2));
    // shoes
    ctx.fillStyle = '#0d0d0d';
    ctx.fillRect(5 + legSwing, 42, 8, 3);
    ctx.fillRect(15 - legSwing, 42, 8, 3);

    // shirt
    ctx.fillStyle = '#1a1a1a'; ctx.fillRect(4, 16, 20, 16);
    // band logo
    ctx.fillStyle = '#ff3860'; ctx.fillRect(10, 20, 8, 2); ctx.fillRect(12, 24, 4, 2);

    // arms
    const armSwing = roadie.onGround ? Math.sin(roadie.legPhase + Math.PI) * 2 : -3;
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 18 + armSwing, 5, 12);
    ctx.fillRect(23, 18 - armSwing, 5, 12);
    // hands
    ctx.fillStyle = '#e0b48a';
    ctx.fillRect(0, 28, 5, 3); ctx.fillRect(23, 28, 5, 3);
    // gaffer roll in left hand
    ctx.fillStyle = '#222'; ctx.fillRect(-3, 26, 6, 6);
    ctx.fillStyle = '#444'; ctx.fillRect(-2, 27, 4, 4);

    // head
    ctx.fillStyle = '#e0b48a'; ctx.fillRect(8, 4, 12, 12);
    // beard
    ctx.fillStyle = '#2a1a10'; ctx.fillRect(8, 12, 12, 4);
    // sunglasses
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(9, 8, 4, 3); ctx.fillRect(15, 8, 4, 3); ctx.fillRect(13, 9, 2, 1);
    // cap
    ctx.fillStyle = '#ff3860';
    ctx.fillRect(7, 1, 14, 5); ctx.fillRect(5, 3, 3, 3);

    // tool belt
    ctx.fillStyle = '#5a3a1a'; ctx.fillRect(4, 30, 20, 3);
    ctx.fillStyle = '#aaa'; ctx.fillRect(8, 30, 2, 4); ctx.fillRect(18, 30, 2, 4);

    ctx.restore();
  }

  function drawSpeaker(o) {
    const x = o.x, y = o.y;
    ctx.fillStyle = '#1c1c22'; ctx.fillRect(x, y, o.w, o.h);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, o.w - 1, o.h - 1);
    ctx.fillStyle = '#666';
    ctx.fillRect(x, y, 4, 4); ctx.fillRect(x + o.w - 4, y, 4, 4);
    ctx.fillRect(x, y + o.h - 4, 4, 4); ctx.fillRect(x + o.w - 4, y + o.h - 4, 4, 4);
    ctx.fillStyle = '#0a0a0a';
    ctx.beginPath(); ctx.arc(x + o.w / 2, y + o.h - 14, 9, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(x + o.w / 2, y + o.h - 14, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + o.w / 2 - 4, y + 6, 8, 5);
    const pulse = (Math.sin(state.t * 0.2) + 1) / 2;
    ctx.fillStyle = `rgba(255, 56, 96, ${0.5 + pulse * 0.5})`;
    ctx.fillRect(x + o.w / 2 - 2, y + o.h - 4, 4, 2);
  }

  function drawFlame(o) {
    o.phase += 0.25;
    const x = o.x + o.w / 2;
    const baseY = GROUND_Y;
    ctx.fillStyle = '#444'; ctx.fillRect(x - 5, baseY - 4, 10, 4);
    ctx.fillStyle = '#222'; ctx.fillRect(x - 6, baseY - 2, 12, 3);

    const flick = Math.sin(o.phase) * 3;
    for (let i = 0; i < 5; i++) {
      const fh = o.h - 4 - i * 4 + flick;
      const fw = o.w - i * 3;
      ctx.fillStyle = i === 0 ? '#ffeb3b' : i < 2 ? '#ff9800' : i < 4 ? '#ff3818' : '#a01020';
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.ellipse(x + Math.sin(o.phase + i) * 1.5, baseY - 4 - fh / 2 + (5 - i), fw / 2, fh / 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const g = ctx.createRadialGradient(x, baseY - o.h / 2, 2, x, baseY - o.h / 2, 50);
    g.addColorStop(0, 'rgba(255, 120, 40, 0.3)');
    g.addColorStop(1, 'rgba(255, 120, 40, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(x - 50, baseY - 70, 100, 70);

    if (Math.random() < 0.4) {
      particles.push({
        x: x + (Math.random() - 0.5) * 6, y: baseY - o.h + 2,
        vx: (Math.random() - 0.5) * 1.5 - state.speed * 0.3,
        vy: -Math.random() * 2 - 1, life: 30,
        col: '#ffaa30', r: 1.5,
      });
    }
  }

  function drawCO2(o) {
    o.phase += 0.4;
    const x = o.x + o.w / 2;
    const baseY = GROUND_Y;
    ctx.fillStyle = '#888'; ctx.fillRect(x - 4, baseY - 6, 8, 6);
    ctx.fillStyle = '#444'; ctx.fillRect(x - 6, baseY - 2, 12, 3);

    for (let i = 0; i < 8; i++) {
      const py = baseY - 8 - i * 6;
      const px = x + Math.sin(o.phase + i * 0.5) * (2 + i * 0.4);
      const rad = 4 + i * 1.2 + Math.sin(o.phase + i) * 0.8;
      ctx.fillStyle = `rgba(220, 230, 245, ${0.7 - i * 0.07})`;
      ctx.beginPath();
      ctx.arc(px, py, rad, 0, Math.PI * 2);
      ctx.fill();
    }

    if (Math.random() < 0.3) {
      particles.push({
        x: x + (Math.random() - 0.5) * 8, y: baseY - o.h,
        vx: -state.speed * 0.5 + (Math.random() - 0.5),
        vy: -Math.random() * 0.5 - 0.2, life: 40,
        col: 'rgba(220,230,245,0.4)', r: 3,
      });
    }
  }

  function drawFlightcase(o) {
    const x = o.x, y = o.y;
    // body
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x, y, o.w, o.h);
    // top edge highlight
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(x, y, o.w, 2);
    // metal corner protectors (the iconic flightcase look)
    ctx.fillStyle = '#999';
    ctx.fillRect(x, y, 6, 6);
    ctx.fillRect(x + o.w - 6, y, 6, 6);
    ctx.fillRect(x, y + o.h - 6, 6, 6);
    ctx.fillRect(x + o.w - 6, y + o.h - 6, 6, 6);
    ctx.fillStyle = '#555';
    ctx.fillRect(x + 1, y + 1, 4, 4);
    ctx.fillRect(x + o.w - 5, y + 1, 4, 4);
    ctx.fillRect(x + 1, y + o.h - 5, 4, 4);
    ctx.fillRect(x + o.w - 5, y + o.h - 5, 4, 4);
    // latches
    ctx.fillStyle = '#aaa';
    const latchY = y + Math.floor(o.h / 2) - 2;
    ctx.fillRect(x + 3, latchY, 5, 4);
    ctx.fillRect(x + o.w - 8, latchY, 5, 4);
    ctx.fillStyle = '#333';
    ctx.fillRect(x + 4, latchY + 1, 3, 2);
    ctx.fillRect(x + o.w - 7, latchY + 1, 3, 2);
    // stencil label (only on bigger boxes)
    if (o.h >= 36) {
      ctx.fillStyle = 'rgba(220,220,220,0.85)';
      ctx.font = 'bold 8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('BLEARRED', x + o.w / 2, y + o.h / 2 + 10);
      ctx.textAlign = 'left';
    }
    // wheels on the large case
    if (o.h >= 50) {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(x + 8, y + o.h, 3, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + o.w - 8, y + o.h, 3, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#444';
      ctx.beginPath(); ctx.arc(x + 8, y + o.h, 1.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(x + o.w - 8, y + o.h, 1.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawStrobo(o) {
    o.phase += 0.5;
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const flash = Math.sin(o.phase) > 0.6;

    // staffa dall'alto (appesa alla truss)
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + w / 2, y); ctx.lineTo(x + w / 2, y - 14);
    ctx.stroke();

    // corpo del proiettore strobo
    ctx.fillStyle = '#15151c';
    ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#3a3a45';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);

    // celle lampada che lampeggiano in sincrono
    const cells = 4;
    const cw = (w - 6) / cells;
    for (let i = 0; i < cells; i++) {
      ctx.fillStyle = flash ? '#ffffff' : '#2a2a30';
      ctx.fillRect(x + 3 + i * cw, y + 4, cw - 2, h - 8);
    }

    // bagliore accecante quando lampeggia
    if (flash) {
      const g = ctx.createRadialGradient(x + w / 2, y + h / 2, 2, x + w / 2, y + h / 2, 60);
      g.addColorStop(0, 'rgba(255,255,255,0.55)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(x + w / 2 - 60, y + h / 2 - 60, 120, 120);
    }
  }

  function drawSinger(o) {
    o.phase += 0.12;
    const x = o.x, y = o.y;
    const armWave = Math.sin(o.phase) * 3;
    const bodyBob = Math.abs(Math.sin(o.phase * 0.5)) * 2;
    const hairShake = Math.sin(o.phase * 1.3) * 1;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath();
    ctx.ellipse(x + o.w / 2, GROUND_Y + 2, 16, 3, 0, 0, Math.PI * 2);
    ctx.fill();

    // legs (skinny jeans)
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 7, y + 44 - bodyBob, 5, 16);
    ctx.fillRect(x + 16, y + 44 - bodyBob, 5, 16);
    // boots
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 5, y + 60 - bodyBob, 8, 4);
    ctx.fillRect(x + 15, y + 60 - bodyBob, 8, 4);

    // body — leather jacket
    ctx.fillStyle = '#2a0e10';
    ctx.fillRect(x + 4, y + 22 - bodyBob, 20, 22);
    // jacket lapels
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 4, y + 22 - bodyBob, 5, 14);
    ctx.fillRect(x + 19, y + 22 - bodyBob, 5, 14);
    // white shirt
    ctx.fillStyle = '#d8d8d8';
    ctx.fillRect(x + 11, y + 24 - bodyBob, 6, 14);
    // belt
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 4, y + 40 - bodyBob, 20, 3);

    // raised arm with mic
    ctx.fillStyle = '#2a0e10';
    ctx.fillRect(x + 22, y + 14 + armWave - bodyBob, 4, 14);
    // hand
    ctx.fillStyle = '#e0b48a';
    ctx.fillRect(x + 22, y + 26 + armWave - bodyBob, 4, 4);
    // mic
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 26, y + 18 + armWave - bodyBob, 4, 12);
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath();
    ctx.arc(x + 28, y + 18 + armWave - bodyBob, 3, 0, Math.PI * 2);
    ctx.fill();

    // other arm hanging
    ctx.fillStyle = '#2a0e10';
    ctx.fillRect(x + 0, y + 24 - bodyBob, 4, 14);
    ctx.fillStyle = '#e0b48a';
    ctx.fillRect(x + 0, y + 36 - bodyBob, 4, 3);

    // head (skin)
    ctx.fillStyle = '#e0b48a';
    ctx.fillRect(x + 8, y + 8 - bodyBob, 12, 14);
    // long hair (dark, shaking)
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 6 + hairShake, y + 4 - bodyBob, 16, 8);
    ctx.fillRect(x + 5 + hairShake, y + 10 - bodyBob, 4, 14);
    ctx.fillRect(x + 19 + hairShake, y + 10 - bodyBob, 4, 14);
    // sunglasses
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(x + 9, y + 13 - bodyBob, 4, 3);
    ctx.fillRect(x + 15, y + 13 - bodyBob, 4, 3);
    ctx.fillRect(x + 13, y + 14 - bodyBob, 2, 1);
    // open mouth (singing)
    ctx.fillStyle = '#5a1010';
    ctx.fillRect(x + 12, y + 18 - bodyBob, 4, 3);
  }

  function drawTransenna(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const top = y + 3, bot = y + h - 4;
    const ph = bot - top;
    // pannello a strisce diagonali rosse/bianche (clip al rettangolo)
    ctx.save();
    ctx.beginPath();
    ctx.rect(x, top, w, ph);
    ctx.clip();
    ctx.fillStyle = '#ececec';
    ctx.fillRect(x, top, w, ph);
    ctx.fillStyle = '#ff3860';
    const sw = 8; // larghezza striscia
    for (let i = -ph; i < w + ph; i += sw * 2) {
      ctx.beginPath();
      ctx.moveTo(x + i, top);
      ctx.lineTo(x + i + sw, top);
      ctx.lineTo(x + i + sw - ph, bot);
      ctx.lineTo(x + i - ph, bot);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    // telaio metallico attorno al pannello
    ctx.strokeStyle = '#9aa0a8';
    ctx.lineWidth = 2;
    ctx.strokeRect(x, top, w, ph);
    // piedini d'appoggio
    ctx.strokeStyle = '#5a5f66';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 3, bot); ctx.lineTo(x - 1, y + h);
    ctx.moveTo(x + w - 3, bot); ctx.lineTo(x + w + 1, y + h);
    ctx.stroke();
  }

  function drawMovingHead(o) {
    o.phase += 0.06;
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const cx = x + w / 2;
    const tilt = Math.sin(o.phase) * 0.5;
    const hue = (state.t * 2 + x * 3) % 360;
    ctx.fillStyle = '#1c1c24';
    ctx.fillRect(x + 2, y + h - 8, w - 4, 8);
    ctx.fillStyle = '#2a2a35';
    ctx.fillRect(x + 4, y + h - 10, w - 8, 3);
    ctx.fillStyle = '#15151c';
    ctx.fillRect(cx - 3, y + 16, 6, h - 26);
    ctx.fillStyle = '#2a2a35';
    ctx.fillRect(cx - 9, y + 14, 4, 12);
    ctx.fillRect(cx + 5, y + 14, 4, 12);
    ctx.save();
    ctx.translate(cx, y + 16);
    ctx.rotate(tilt);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(-8, -8, 16, 16);
    ctx.fillStyle = `hsl(${hue}, 90%, 60%)`;
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();
    const g = ctx.createLinearGradient(0, 0, 0, -60);
    g.addColorStop(0, `hsla(${hue},90%,60%,0.5)`);
    g.addColorStop(1, `hsla(${hue},90%,60%,0)`);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(-4, -4); ctx.lineTo(-22, -60); ctx.lineTo(22, -60); ctx.lineTo(4, -4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function drawDrummer(o) {
    o.phase += 0.3;
    const x = o.x, y = o.y, w = o.w, h = o.h;
    const hit = Math.sin(o.phase) * 3;
    ctx.fillStyle = '#14141c';
    ctx.beginPath();
    ctx.arc(x + w / 2, y + h - 12, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ff3860';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#ff3860';
    ctx.fillRect(x + w / 2 - 5, y + h - 14, 10, 3);
    ctx.strokeStyle = '#5a5f66';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + w - 8, y + h - 6); ctx.lineTo(x + w - 8, y + 6);
    ctx.stroke();
    ctx.fillStyle = '#d4af37';
    ctx.beginPath();
    ctx.ellipse(x + w - 8, y + 6 + hit * 0.3, 9, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e0b48a';
    ctx.fillRect(x + 6, y, 10, 10);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(x + 5, y - 1, 12, 4);
    ctx.fillStyle = '#222';
    ctx.fillRect(x + 4, y + 10, 14, 14);
    ctx.strokeStyle = '#e0b48a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 13); ctx.lineTo(x + 2, y + 18 + hit);
    ctx.moveTo(x + 14, y + 13); ctx.lineTo(x + w - 10, y + 12 - hit);
    ctx.stroke();
    ctx.strokeStyle = '#caa472';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 2, y + 18 + hit); ctx.lineTo(x - 3, y + 22 + hit);
    ctx.moveTo(x + w - 10, y + 12 - hit); ctx.lineTo(x + w - 6, y + 8 - hit);
    ctx.stroke();
  }

  function drawScaffold(o) {
    const x = o.x, y = o.y, w = o.w, h = o.h;
    ctx.strokeStyle = '#8a9098';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(x + 3, y + 4); ctx.lineTo(x + 3, y + h - 4);
    ctx.moveTo(x + w - 3, y + 4); ctx.lineTo(x + w - 3, y + h - 4);
    ctx.stroke();
    ctx.strokeStyle = '#6a7078';
    ctx.lineWidth = 1.5;
    const levels = 3;
    const segH = (h - 14) / levels;
    for (let i = 0; i < levels; i++) {
      const yt = y + 4 + i * segH;
      const yb = yt + segH;
      ctx.beginPath();
      ctx.moveTo(x + 3, yt); ctx.lineTo(x + w - 3, yb);
      ctx.moveTo(x + w - 3, yt); ctx.lineTo(x + 3, yb);
      ctx.moveTo(x + 3, yt); ctx.lineTo(x + w - 3, yt);
      ctx.stroke();
    }
    ctx.fillStyle = '#3a2f22';
    ctx.fillRect(x - 1, y, w + 2, 5);
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(x - 1, y, w + 2, 2);
    ctx.strokeStyle = '#8a9098';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 1, y); ctx.lineTo(x + 1, y - 8);
    ctx.moveTo(x + w - 1, y); ctx.lineTo(x + w - 1, y - 8);
    ctx.moveTo(x + 1, y - 8); ctx.lineTo(x + w - 1, y - 8);
    ctx.stroke();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(x + 3, y + h, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w - 3, y + h, 3, 0, Math.PI * 2); ctx.fill();
  }

  function drawObstacles() {
    obstacles.forEach(o => {
      if (o.type === 'speaker') drawSpeaker(o);
      else if (o.type === 'flame') drawFlame(o);
      else if (o.type === 'co2') drawCO2(o);
      else if (o.type === 'flightcase_l') drawFlightcase(o);
      else if (o.type === 'transenna') drawTransenna(o);
      else if (o.type === 'testa_mobile') drawMovingHead(o);
      else if (o.type === 'batterista') drawDrummer(o);
      else if (o.type === 'trabattello') drawScaffold(o);
      else if (o.type === 'strobo') drawStrobo(o);
      else if (o.type === 'singer') drawSinger(o);
    });
  }

  function drawPasses() {
    passes.forEach(p => {
      const x = p.x, y = p.y, w = p.w, h = p.h;
      // cordino (lanyard)
      ctx.strokeStyle = '#ff3860';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x + w / 2 - 5, y - 8);
      ctx.lineTo(x + w / 2, y);
      ctx.lineTo(x + w / 2 + 5, y - 8);
      ctx.stroke();
      // corpo del laminato
      ctx.fillStyle = '#12121a';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#ffd24a';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
      // scritta BLEARRED verticale (micro)
      ctx.save();
      ctx.translate(x + w / 2, y + h / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillStyle = '#ffd24a';
      ctx.font = 'bold 5px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('BLEARRED', 0, 0);
      ctx.restore();
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
    });
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.fillStyle = p.col;
      ctx.globalAlpha = Math.min(1, p.life / 30);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  function drawHUD() {
    ctx.fillStyle = '#999';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(String(Math.floor(state.score)).padStart(5, '0'), W - 10, 50);
    ctx.fillStyle = '#666';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('HI ' + String(state.best).padStart(5, '0'), W - 10, 66);
    ctx.textAlign = 'left';

    if (!state.started && !state.over) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, 0, W, H);
      const pulse = 0.6 + Math.sin(performance.now() / 350) * 0.4;
      ctx.fillStyle = `rgba(255, 56, 96, ${pulse})`;
      ctx.font = 'bold 30px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('TOCCA', W / 2, H / 2 - 16);
      ctx.fillText('PER INIZIARE', W / 2, H / 2 + 22);
      ctx.fillStyle = '#aaa';
      ctx.font = '12px monospace';
      ctx.fillText('Salta gli ostacoli del palco', W / 2, H / 2 + 70);
      ctx.textAlign = 'left';
    }

    if (state.over) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff3860';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('SHOW INTERROTTO', W / 2, H / 2 - 20);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px monospace';
      ctx.fillText(String(Math.floor(state.score)).padStart(5, '0'), W / 2, H / 2 + 12);
      ctx.fillStyle = '#aaa';
      ctx.font = '12px monospace';
      ctx.fillText('Tocca per ricominciare', W / 2, H / 2 + 44);
      ctx.textAlign = 'left';
    }
  }

  function hitbox(o) {
    if (o.type === 'speaker') return { x: o.x + 2, y: o.y + 4, w: o.w - 4, h: o.h - 6 };
    if (o.type === 'flame') return { x: o.x + 4, y: o.y + 6, w: o.w - 8, h: o.h - 8 };
    if (o.type === 'co2') return { x: o.x + 3, y: o.y - 4, w: o.w - 6, h: o.h - 6 };
    if (o.type === 'flightcase_l')
      return { x: o.x + 2, y: o.y + 2, w: o.w - 4, h: o.h - 4 };
    if (o.type === 'transenna') return { x: o.x + 2, y: o.y + 2, w: o.w - 4, h: o.h - 3 };
    if (o.type === 'testa_mobile') return { x: o.x + 5, y: o.y + 4, w: o.w - 10, h: o.h - 6 };
    if (o.type === 'batterista') return { x: o.x + 3, y: o.y + 4, w: o.w - 8, h: o.h - 6 };
    if (o.type === 'trabattello') return { x: o.x + 3, y: o.y + 1, w: o.w - 6, h: o.h - 3 };
    if (o.type === 'strobo') return { x: o.x + 2, y: o.y + 3, w: o.w - 4, h: o.h - 6 };
    if (o.type === 'singer') return { x: o.x + 4, y: o.y + 6, w: o.w - 8, h: o.h - 10 };
    return { x: o.x, y: o.y, w: o.w, h: o.h };
  }

  function roadieBox() {
    return {
      x: roadie.x + 3,
      y: roadie.y - (roadie.h - 2),
      w: roadie.w - 4,
      h: roadie.h - 2,
    };
  }

  function overlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function update() {
    if (!state.started || state.over) return;
    state.t++;
    state.score += 0.1 * (state.speed / 5);

    if (state.t % 250 === 0 && state.speed < 11) state.speed += 0.4;

    roadie.vy += GRAVITY;
    roadie.y += roadie.vy;
    if (roadie.y >= GROUND_Y) { roadie.y = GROUND_Y; roadie.vy = 0; roadie.onGround = true; roadie.jumpsLeft = 2; }
    if (roadie.onGround) roadie.legPhase += 0.35 * (state.speed / 5);

    nextSpawn--;
    if (nextSpawn <= 0) {
      const ob = spawnObstacle();
      let blockW = ob.w;

      const canPair = ob.type !== 'strobo' && ob.type !== 'singer' && ob.type !== 'flightcase_l'
        && ob.type !== 'batterista' && ob.type !== 'trabattello';
      const pairChance = state.score < 100 ? 0.12 : state.score < 300 ? 0.20 : 0.28;
      if (canPair && Math.random() < pairChance) {
        const type2 = PAIR_TYPES[Math.floor(Math.random() * PAIR_TYPES.length)];
        const gap = 100 + Math.random() * 40;
        const ob2 = makeObstacle(type2, ob.x + ob.w + gap);
        obstacles.push(ob2);
        blockW = (ob2.x - ob.x) + ob2.w;
      }

      const extra = blockW > 35 ? Math.floor((blockW - 35) * 0.8) : 0;
      const base = 70 + Math.random() * 60 + extra;
      nextSpawn = Math.floor(base * (5 / state.speed));
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.x -= state.speed;
      if (o.x + o.w < -20) obstacles.splice(i, 1);
      else if (!o.hit && overlap(roadieBox(), hitbox(o))) {
        o.hit = true;
        gameOver();
      }
    }

    // --- Pass collezionabili (bonus, non causano MAI game over) ---
    nextPass--;
    if (nextPass <= 0) {
      spawnPass();
      nextPass = Math.floor((120 + Math.random() * 120) * (5 / state.speed));
    }
    for (let i = passes.length - 1; i >= 0; i--) {
      const p = passes[i];
      p.x -= state.speed;
      if (p.x + p.w < -20) { passes.splice(i, 1); continue; }
      if (!p.taken && overlap(roadieBox(), p)) {
        p.taken = true;
        state.score += 50;
        for (let k = 0; k < 8; k++) {
          particles.push({
            x: p.x + p.w / 2, y: p.y + p.h / 2,
            vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.7) * 4,
            life: 25 + Math.random() * 15,
            col: ['#ffd24a', '#ffe9a0', '#fff3c4'][Math.floor(Math.random() * 3)],
            r: 1 + Math.random() * 2,
          });
        }
        passes.splice(i, 1);
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function gameOver() {
    state.over = true;
    if (state.score > state.best) {
      state.best = Math.floor(state.score);
      localStorage.setItem('roadie_best', String(state.best));
    }
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: roadie.x + 14, y: roadie.y - 20,
        vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.7) * 6,
        life: 40 + Math.random() * 20,
        col: ['#ff3860', '#ffaa30', '#ffe060'][Math.floor(Math.random() * 3)],
        r: 1 + Math.random() * 2,
      });
    }
    document.dispatchEvent(new CustomEvent('roadie:gameover', { detail: { score: Math.floor(state.score) } }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawGround();
    drawObstacles();
    drawPasses();
    drawParticles();
    drawRoadie();
    drawHUD();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

<script type="module">
  // Se il CDN dà 404, basta aggiornare il numero di versione qui sotto.
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore, collection, addDoc, getDocs, query, orderBy, limit, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyANZhV6W0zSCs5nNwe7uHpOp8fGdajWwUg",
    authDomain: "roadie-runner.firebaseapp.com",
    projectId: "roadie-runner",
    storageBucket: "roadie-runner.firebasestorage.app",
    messagingSenderId: "248484299780",
    appId: "1:248484299780:web:19526213ac492b0bcae151",
    measurementId: "G-LMLR7P0828"
  };

  let db = null;
  try {
    db = getFirestore(initializeApp(firebaseConfig));
  } catch (e) {
    console.warn('Firebase non inizializzato:', e);
  }

  window.LB = {
    ready: !!db,
    async submit(name, score) {
      if (!db) return false;
      await addDoc(collection(db, 'scores'), {
        name: String(name).slice(0, 12),
        score: Math.floor(score),
        ts: serverTimestamp(),
      });
      return true;
    },
    async top(n = 10) {
      if (!db) return null;
      // Le regole Firestore sono create-only (no update/delete): possono esistere
      // più documenti con lo stesso nome. Leggiamo un po' di documenti in più e
      // deduplichiamo lato client, tenendo per ogni nome solo il punteggio più alto.
      const snap = await getDocs(query(collection(db, 'scores'), orderBy('score', 'desc'), limit(100)));
      const bestByName = new Map();
      snap.docs.forEach(d => {
        const r = d.data();
        const key = String(r.name || '???').trim().toLowerCase();
        const prev = bestByName.get(key);
        if (!prev || Math.floor(r.score || 0) > Math.floor(prev.score || 0)) bestByName.set(key, r);
      });
      return [...bestByName.values()]
        .sort((a, b) => Math.floor(b.score || 0) - Math.floor(a.score || 0))
        .slice(0, n);
    },
  };
  document.dispatchEvent(new Event('lb:ready'));
</script>

<script>
(() => {
  const lb = document.getElementById('lb');
  const list = document.getElementById('lb-list');
  const msg = document.getElementById('lb-msg');
  const entry = document.getElementById('lb-entry');
  const nameInput = document.getElementById('lb-name');
  const saveBtn = document.getElementById('lb-save');
  const closeBtn = document.getElementById('lb-close');
  const openBtn = document.getElementById('lb-open');
  const scoreBox = document.getElementById('lb-score');
  const scoreVal = document.getElementById('lb-score-val');
  const titleEl = document.getElementById('lb-title');
  const replayBtn = document.getElementById('lb-replay');

  const TOP_N = 10;
  const pad = (n) => String(Math.floor(n || 0)).padStart(5, '0');
  const norm = (s) => String(s || '').trim().toLowerCase();

  function setMsg(t) {
    if (!t) { msg.hidden = true; msg.textContent = ''; return; }
    msg.hidden = false; msg.textContent = t;
  }
  function setTitle(t) {
    if (!t) { titleEl.hidden = true; titleEl.textContent = ''; return; }
    titleEl.hidden = false; titleEl.textContent = t;
  }

  // Punteggio già registrato per un dato nome (dedup case-insensitive), o -1.
  function existingScore(rows, name) {
    if (!rows || !name) return -1;
    const key = norm(name);
    const r = rows.find(x => norm(x.name) === key);
    return r ? Math.floor(r.score || 0) : -1;
  }

  // rows: Top N (già dedotta per nome). myScore != null → riga "TU" in fondo.
  // flashName: evidenzia con animazione la riga di quel nome (nuovo record).
  function renderList(rows, meName, myScore, flashName) {
    list.innerHTML = '';
    const hasRows = rows && rows.length > 0;
    if (!hasRows && myScore == null) { setMsg('Nessun punteggio ancora. Sii il primo!'); return; }
    if (hasRows) {
      setMsg('');
      rows.forEach((r, i) => {
        const li = document.createElement('li');
        const isMe = meName && norm(r.name) === norm(meName);
        if (isMe) li.className = 'me';
        if (flashName && norm(r.name) === norm(flashName)) li.className = (isMe ? 'me ' : '') + 'flash';
        const rank = document.createElement('span'); rank.className = 'rank'; rank.textContent = (i + 1) + '.';
        const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = r.name || '???';
        const sc = document.createElement('span'); sc.className = 'sc'; sc.textContent = pad(r.score);
        li.append(rank, nm, sc);
        list.appendChild(li);
      });
    }
    if (myScore != null) {
      const li = document.createElement('li');
      li.className = 'me';
      const rank = document.createElement('span'); rank.className = 'rank'; rank.textContent = '•';
      const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = 'TU';
      const sc = document.createElement('span'); sc.className = 'sc'; sc.textContent = pad(myScore);
      li.append(rank, nm, sc);
      list.appendChild(li);
    }
  }

  // true se il punteggio entra nella Top N (meno di N voci, o batte l'ultima).
  function qualifies(rows, score) {
    if (!rows || rows.length < TOP_N) return true;
    return Math.floor(score) > Math.floor(rows[rows.length - 1].score || 0);
  }

  function show() { lb.hidden = false; document.body.classList.add('ui-open'); }
  function hide() { lb.hidden = true; document.body.classList.remove('ui-open'); }

  // Legge e disegna la Top N. Ritorna le righe (o null se non disponibile).
  async function loadList(highlightName, flashName) {
    setMsg('Caricamento…');
    if (!window.LB || !window.LB.ready) { list.innerHTML = ''; setMsg('Classifica non disponibile (offline).'); return null; }
    try {
      const rows = await window.LB.top(TOP_N);
      renderList(rows, highlightName, null, flashName);
      return rows;
    } catch (e) {
      console.warn(e); list.innerHTML = ''; setMsg('Classifica non raggiungibile.');
      return null;
    }
  }

  // Apertura dalla home: sola consultazione, niente punteggio/nome/rigioca.
  openBtn.addEventListener('click', () => {
    scoreBox.hidden = true; setTitle(''); entry.hidden = true; replayBtn.hidden = true;
    show(); loadList(null);
  });
  closeBtn.addEventListener('click', hide);
  replayBtn.addEventListener('click', () => { hide(); document.dispatchEvent(new Event('roadie:restart')); });

  // Invia il punteggio e ricarica la Top N evidenziando/animando il nuovo record.
  async function submitAndRefresh(name, score) {
    if (!window.LB || !window.LB.ready) { setMsg('Offline: punteggio non inviato.'); return false; }
    try {
      await window.LB.submit(name, score);
      await loadList(name, name);   // flash sulla riga appena inserita
      return true;
    } catch (err) {
      console.warn(err); setMsg('Invio fallito. Riprova.'); return false;
    }
  }

  let pendingScore = 0;
  let lastRows = null;

  document.addEventListener('roadie:gameover', async (e) => {
    pendingScore = (e.detail && e.detail.score) || 0;
    const meName = localStorage.getItem('roadie_name') || null;

    // UI base del game over: punteggio grande + pulsante Rigioca.
    scoreVal.textContent = pad(pendingScore);
    scoreBox.hidden = false;
    replayBtn.hidden = false;
    entry.hidden = true;
    setTitle('');
    show();
    setMsg('Caricamento…');

    const offline = !(window.LB && window.LB.ready);
    let rows = null, loadErr = false;
    if (!offline) {
      try { rows = await window.LB.top(TOP_N); }
      catch (err) { console.warn(err); loadErr = true; }
    }
    lastRows = rows;

    if (offline) {
      renderList(null, meName, pendingScore);
      setMsg('Classifica offline: punteggio non salvato.');
      return;
    }
    if (loadErr) {
      if (meName) {
        renderList(null, meName, pendingScore);
        setMsg('Classifica non raggiungibile — riprova più tardi.');
      } else {
        renderList(null, meName, pendingScore);
        entry.hidden = false; nameInput.value = '';
        setMsg('Classifica non raggiungibile — inserisci il nome per riprovare.');
        setTimeout(() => nameInput.focus(), 60);
      }
      return;
    }

    const prev = existingScore(rows, meName);          // record precedente del giocatore
    const beatsSelf = Math.floor(pendingScore) > prev; // ha migliorato il proprio record?

    if (qualifies(rows, pendingScore) && beatsSelf) {
      if (meName) {
        // Nome già noto: salvataggio automatico (nessun modulo), poi anima il record.
        renderList(rows, meName);
        setTitle('🎉 Nuovo High Score!');
        setMsg('Salvataggio…');
        if (await submitAndRefresh(meName, pendingScore)) setMsg('Salvato come ' + meName + '.');
      } else {
        // Primo record in assoluto: chiedi il nome (una sola volta).
        renderList(rows, meName);
        setTitle('🎉 Nuovo High Score!');
        entry.hidden = false; nameInput.value = '';
        setMsg('Inserisci il tuo nome per salvarlo.');
        setTimeout(() => nameInput.focus(), 60);
      }
    } else if (!beatsSelf && prev >= 0) {
      // In classifica ma non hai battuto il tuo record: nessun modulo.
      renderList(rows, meName);
      setMsg('Il tuo record resta ' + pad(prev) + '. Riprova!');
    } else {
      // Fuori dalla Top 10: mostra la Top 10 (senza riga "TU"), niente modulo nome.
      renderList(rows, meName);
      setMsg('Mi spiace, non sei in classifica. Ritenta!');
    }
  });

  async function saveScore() {
    const name = (nameInput.value || '').trim().slice(0, 12);
    if (!name) { nameInput.focus(); return; }
    // Un nome può comparire una sola volta: non sovrascrivere un record già più alto.
    if (existingScore(lastRows, name) >= Math.floor(pendingScore)) {
      setMsg('"' + name + '" ha già un punteggio più alto in classifica.');
      return;
    }
    localStorage.setItem('roadie_name', name);   // memorizzato: non verrà più richiesto
    saveBtn.disabled = true; setMsg('Invio…');
    const ok = await submitAndRefresh(name, pendingScore);
    saveBtn.disabled = false;
    if (ok) { entry.hidden = true; setMsg('Salvato come ' + name + '.'); }
  }

  saveBtn.addEventListener('click', saveScore);
  nameInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); saveScore(); }
    e.stopPropagation();
  });
})();
</script>
